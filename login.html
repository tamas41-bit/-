<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 한큐빌리어드 리그</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="index.html">한큐빌리어드</a><span id="navBrandUser" style="display:none;color:var(--gold);font-weight:bold;font-size:0.82rem;margin-left:0.5rem;">[ <span id="navBrandUserName"></span> 님 ]</span>
    <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="index.html" class="nav-link">리그전 현황</a>
      <a href="schedule.html" class="nav-link">경기 일정</a>
      <a href="history.html" class="nav-link">이전 리그 결과</a>
      <a href="members.html" class="nav-link">회원 목록</a>
      <a href="lecture.html" class="nav-link" style="display:none;">당구 강의 게시판</a>
      <a href="admin.html" class="nav-link">관리자</a>
      <a href="login.html" class="nav-link active" id="navLoginBtn">로그인</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="card" style="max-width:420px;margin:2rem auto;">
    <div class="card-header">
      <div class="card-title">회원 로그인</div>
    </div>
    <div id="loginAlert"></div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input type="text" class="form-control input-masked" id="loginPin" maxlength="4" placeholder="4자리 숫자" inputmode="numeric" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-gold btn-full" onclick="doLogin()">로그인</button>
  </div>
</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
